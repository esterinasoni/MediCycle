<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCycle — Create Account</title>
    <script src="config.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #0e6e4a; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #14a370; }
        .error { color: red; margin-top: 10px; display: none; }
        .success { color: green; margin-top: 10px; display: none; }
        .step { display: none; }
        .active { display: block; }
    </style>
</head>
<body>
    <h1>Create MediCycle Account</h1>
    
    <!-- Step 1: Registration Form -->
    <div id="registerStep" class="step active">
        <div id="regError" class="error"></div>
        <div id="regSuccess" class="success"></div>
        
        <div class="form-group">
            <label>Full Name *</label>
            <input type="text" id="fullName" placeholder="Enter your full name">
        </div>
        
        <div class="form-group">
            <label>Email *</label>
            <input type="email" id="email" placeholder="your@email.com">
        </div>
        
        <div class="form-group">
            <label>Phone Number *</label>
            <input type="tel" id="phone" placeholder="08012345678">
        </div>
        
        <div class="form-group">
            <label>Password *</label>
            <input type="password" id="password" placeholder="Min. 6 characters">
        </div>
        
        <button onclick="registerUser()">Create Account</button>
    </div>
    
    <!-- Step 2: OTP Verification -->
    <div id="otpStep" class="step">
        <p>We've sent a verification code to <strong id="otpEmail"></strong></p>
        <div class="form-group">
            <label>Enter 6-digit code</label>
            <input type="text" id="otpCode" maxlength="6" placeholder="123456">
        </div>
        <div id="otpError" class="error"></div>
        <button onclick="verifyOtp()">Verify Account</button>
    </div>

    <script>
        const API = window.API_URL || window.location.origin;
        console.log('API URL:', API);
        
        let registeredEmail = '';
        
        window.registerUser = async function() {
            const errorDiv = document.getElementById('regError');
            const successDiv = document.getElementById('regSuccess');
            errorDiv.style.display = 'none';
            successDiv.style.display = 'none';
            
            const fullName = document.getElementById('fullName').value.trim();
            const email = document.getElementById('email').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            
            if (!fullName || !email || !phone || !password) {
                errorDiv.textContent = 'Please fill in all fields';
                errorDiv.style.display = 'block';
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        full_name: fullName,
                        email: email,
                        phone_number: phone,
                        password: password
                    })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || 'Registration failed');
                }
                
                registeredEmail = email;
                document.getElementById('otpEmail').textContent = email;
                
                // Switch to OTP step
                document.getElementById('registerStep').classList.remove('active');
                document.getElementById('otpStep').classList.add('active');
                
                successDiv.textContent = 'Registration successful! Check your email for OTP.';
                successDiv.style.display = 'block';
                
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
                console.error('Registration error:', err);
            }
        };
        
        window.verifyOtp = async function() {
            const otpCode = document.getElementById('otpCode').value.trim();
            const errorDiv = document.getElementById('otpError');
            errorDiv.style.display = 'none';
            
            if (!otpCode || otpCode.length !== 6) {
                errorDiv.textContent = 'Please enter the 6-digit code';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch(`${API}/auth/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: registeredEmail,
                        otp_code: otpCode
                    })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || 'Verification failed');
                }
                
                window.location.href = 'login.html?verified=1';
                
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
                console.error('Verification error:', err);
            }
        };
        
        // Allow Enter key to submit
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('registerStep').classList.contains('active')) {
                    registerUser();
                } else if (document.getElementById('otpStep').classList.contains('active')) {
                    verifyOtp();
                }
            }
        });
    </script>
</body>
</html>
