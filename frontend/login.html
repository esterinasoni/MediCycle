<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCycle — Sign In</title>
    <script src="config.js"></script>
    <style>
        body { font-family: Arial, sans-serif; max-width: 400px; margin: 50px auto; padding: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #0e6e4a; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; width: 100%; }
        button:hover { background: #14a370; }
        .error { color: red; margin-top: 10px; display: none; }
        .success { color: green; margin-top: 10px; display: none; }
        .verified-banner { background: #e8f5ef; color: #0e6e4a; padding: 10px; border-radius: 4px; margin-bottom: 20px; display: none; text-align: center; }
    </style>
</head>
<body>
    <h1>Welcome Back</h1>
    <p>Don't have an account? <a href="register.html">Create one</a></p>
    
    <div id="verifiedBanner" class="verified-banner">✅ Account verified! Please sign in.</div>
    <div id="loginError" class="error"></div>
    
    <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com">
    </div>
    
    <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter your password">
    </div>
    
    <button onclick="loginUser()">Sign In</button>

    <script>
        const API = window.API_URL || window.location.origin;
        console.log('API URL:', API);
        
        // Show verified banner if coming from registration
        if (window.location.search.includes('verified=1')) {
            document.getElementById('verifiedBanner').style.display = 'block';
        }
        
        window.loginUser = async function() {
            const errorDiv = document.getElementById('loginError');
            errorDiv.style.display = 'none';
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                errorDiv.textContent = 'Please enter email and password';
                errorDiv.style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.detail || 'Login failed');
                }
                
                // Store token
                localStorage.setItem('mc_token', data.access_token);
                localStorage.setItem('mc_user', JSON.stringify({ email, name: data.user?.full_name || '' }));
                
                // Redirect to dashboard
                window.location.href = 'Dashboard.html';
                
            } catch (err) {
                errorDiv.textContent = err.message;
                errorDiv.style.display = 'block';
                console.error('Login error:', err);
            }
        };
        
        // Allow Enter key to submit
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loginUser();
            }
        });
    </script>
</body>
</html>
