services:
  - type: web
    name: medicycle-backend
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: USE_MOCK_PAYMENTS
        value: "true"

  - type: static
    name: medicycle-frontend
    rootDir: frontend
    buildCommand: bash ./render-build.sh
    staticPublishPath: dist
    envVars:
      - key: RENDER_BACKEND_URL
        value: https://medicycle-backend.onrender.com
